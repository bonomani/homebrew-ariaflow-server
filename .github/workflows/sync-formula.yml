name: sync-formula

on:
  repository_dispatch:
    types:
      - sync-formula
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get latest ariaflow release
        id: release
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          if [ -z "$TAG" ]; then
            # Skip draft releases — use first published (non-draft) release
            TAG=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/bonomani/ariaflow/releases \
              | python3 -c "import sys,json; data=json.load(sys.stdin); r=[x for x in (data if isinstance(data,list) else []) if not x.get('draft',True) and x.get('tag_name')]; r.sort(key=lambda x: x['created_at'], reverse=True); print(r[0]['tag_name'])")
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check current formula version
        id: current
        run: |
          CURRENT=$(grep -oP '(?<=version ").*(?=")' Formula/ariaflow.rb || echo "none")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update formula if version changed
        if: steps.release.outputs.version != steps.current.outputs.version
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          URL="https://github.com/bonomani/ariaflow/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')

          cat > Formula/ariaflow.rb <<FORMULA
          class Ariaflow < Formula
            desc "Sequential aria2 queue driver with adaptive bandwidth control"
            homepage "https://github.com/bonomani/ariaflow"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"
            depends_on "python"
            depends_on "aria2"
            head "https://github.com/bonomani/ariaflow.git", branch: "master"

            def install
              libexec.install "src"

              (bin/"ariaflow").write <<~EOS
                #!/bin/bash
                exec env PYTHONPATH="#{libexec}/src:\${PYTHONPATH}" python3 -m aria_queue "\$@"
              EOS
              chmod 0755, bin/"ariaflow"
            end

            service do
              run [opt_bin/"ariaflow", "serve", "--host", "127.0.0.1", "--port", "8000"]
              keep_alive true
              working_dir var
              log_path var/"log/ariaflow.log"
              error_log_path var/"log/ariaflow.err.log"
            end

            test do
              system bin/"ariaflow", "--help"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow.rb
          git commit -m "Update ariaflow formula to ${VERSION}"
          git push
